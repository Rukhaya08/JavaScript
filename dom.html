<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="me">Hello students</h1>

    <button onclick="changetext()">click me</button>

    <script>
        function changetext(){
            let element=document.getElementById("me")
            element.innerText="welcome to dom manipulation"
        }
    </script>
</body>
</html>
